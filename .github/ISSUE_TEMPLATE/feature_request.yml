name: Feature Request
description: Suggest an improvement for AutoAppearance.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List other approaches or workarounds you have tried.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, links, settings snippets, or desktop details.
